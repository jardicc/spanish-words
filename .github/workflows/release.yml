name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-windows-x64
            artifact: spanish-words-windows-x64
            exe: spanish-words.exe
            archive: zip
          - target: bun-linux-x64
            artifact: spanish-words-linux-x64
            exe: spanish-words
            archive: tar.gz
          - target: bun-darwin-arm64
            artifact: spanish-words-darwin-arm64
            exe: spanish-words
            archive: tar.gz
          - target: bun-darwin-x64
            artifact: spanish-words-darwin-x64
            exe: spanish-words
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release
        run: bun scripts/release.ts --target=${{ matrix.target }}

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        working-directory: release
        run: zip -r ../${{ matrix.artifact }}.zip .

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C release .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            gh release upload ${{ needs.release-please.outputs.tag_name }} \
              ${{ matrix.artifact }}.zip --clobber
          else
            gh release upload ${{ needs.release-please.outputs.tag_name }} \
              ${{ matrix.artifact }}.tar.gz --clobber
          fi
